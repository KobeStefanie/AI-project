<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流派配置管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-6xl mx-auto">
        <div class="bg-white rounded-lg shadow-lg p-8">
            <div class="flex items-center justify-between mb-6">
                <h1 class="text-3xl font-bold text-gray-800">
                    <i class="fa fa-cog text-blue-600"></i> 流派配置管理
                </h1>
                <button onclick="addApproach()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                    <i class="fa fa-plus"></i> 添加流派
                </button>
            </div>

            <!-- 流派列表 -->
            <div id="approachList" class="space-y-4">
                <!-- 动态生成 -->
            </div>

            <!-- 操作按钮 -->
            <div class="mt-6 flex gap-3">
                <button onclick="saveAllApproaches()" class="px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700">
                    <i class="fa fa-save"></i> 保存所有配置
                </button>
                <button onclick="loadApproaches()" class="px-6 py-3 bg-gray-600 text-white rounded-lg hover:bg-gray-700">
                    <i class="fa fa-refresh"></i> 重新加载
                </button>
                <a href="案例库/index.html" class="px-6 py-3 bg-purple-600 text-white rounded-lg hover:bg-purple-700 inline-block">
                    <i class="fa fa-book"></i> 返回案例库
                </a>
            </div>

            <!-- 保存状态提示 -->
            <div id="statusMessage" class="mt-4 hidden">
                <!-- 动态显示 -->
            </div>
        </div>
    </div>

    <script>
        let approaches = [];
        let nextTempId = 1;

        // Font Awesome图标选项
        const iconOptions = [
            'fa-compass', 'fa-brain', 'fa-heart', 'fa-leaf', 'fa-bullseye',
            'fa-lightbulb', 'fa-users', 'fa-star', 'fa-sun', 'fa-moon',
            'fa-tree', 'fa-cloud', 'fa-anchor', 'fa-rocket', 'fa-flag'
        ];

        // 颜色选项
        const colorOptions = [
            { value: '#2563eb', label: '蓝色' },
            { value: '#dc2626', label: '红色' },
            { value: '#16a34a', label: '绿色' },
            { value: '#ea580c', label: '橙色' },
            { value: '#9333ea', label: '紫色' },
            { value: '#0891b2', label: '青色' },
            { value: '#65a30d', label: '草绿' },
            { value: '#db2777', label: '粉红' },
        ];

        // 加载流派配置
        async function loadApproaches() {
            try {
                const response = await fetch('http://localhost:8003/api/approaches');
                if (response.ok) {
                    approaches = await response.json();
                    renderApproaches();
                } else {
                    showMessage('加载失败：' + response.statusText, 'error');
                }
            } catch (error) {
                showMessage('无法连接到后端服务，请确保已启动配置服务器', 'error');
                console.error(error);
            }
        }

        // 渲染流派列表
        function renderApproaches() {
            const container = document.getElementById('approachList');
            container.innerHTML = '';

            approaches.sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));

            approaches.forEach((approach, index) => {
                const card = document.createElement('div');
                card.className = 'border rounded-lg p-4 bg-gray-50';
                card.innerHTML = `
                    <div class="grid grid-cols-12 gap-4 items-center">
                        <div class="col-span-2">
                            <label class="block text-sm font-semibold text-gray-700 mb-1">ID</label>
                            <input type="text" value="${approach.id}"
                                   onchange="updateApproach(${index}, 'id', this.value)"
                                   class="w-full px-3 py-2 border rounded"
                                   ${approach.id.startsWith('temp_') ? '' : 'readonly'}>
                        </div>
                        <div class="col-span-2">
                            <label class="block text-sm font-semibold text-gray-700 mb-1">名称</label>
                            <input type="text" value="${approach.name}"
                                   onchange="updateApproach(${index}, 'name', this.value)"
                                   class="w-full px-3 py-2 border rounded">
                        </div>
                        <div class="col-span-2">
                            <label class="block text-sm font-semibold text-gray-700 mb-1">图标</label>
                            <select onchange="updateApproach(${index}, 'icon', this.value)"
                                    class="w-full px-3 py-2 border rounded">
                                ${iconOptions.map(icon => `
                                    <option value="${icon}" ${approach.icon === icon ? 'selected' : ''}>
                                        ${icon.replace('fa-', '')}
                                    </option>
                                `).join('')}
                            </select>
                            <div class="mt-1 text-center">
                                <i class="fa ${approach.icon} text-2xl" style="color: ${approach.color}"></i>
                            </div>
                        </div>
                        <div class="col-span-2">
                            <label class="block text-sm font-semibold text-gray-700 mb-1">颜色</label>
                            <select onchange="updateApproach(${index}, 'color', this.value)"
                                    class="w-full px-3 py-2 border rounded">
                                ${colorOptions.map(color => `
                                    <option value="${color.value}" ${approach.color === color.value ? 'selected' : ''}>
                                        ${color.label}
                                    </option>
                                `).join('')}
                            </select>
                        </div>
                        <div class="col-span-1">
                            <label class="block text-sm font-semibold text-gray-700 mb-1">排序</label>
                            <input type="number" value="${approach.sort_order || 0}"
                                   onchange="updateApproach(${index}, 'sort_order', parseInt(this.value))"
                                   class="w-full px-3 py-2 border rounded">
                        </div>
                        <div class="col-span-1">
                            <label class="block text-sm font-semibold text-gray-700 mb-1">启用</label>
                            <div class="flex items-center justify-center h-10">
                                <input type="checkbox" ${approach.enabled ? 'checked' : ''}
                                       onchange="updateApproach(${index}, 'enabled', this.checked)"
                                       class="w-5 h-5">
                            </div>
                        </div>
                        <div class="col-span-2 flex items-end justify-end">
                            <button onclick="deleteApproach(${index})"
                                    class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">
                                <i class="fa fa-trash"></i> 删除
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 添加新流派
        function addApproach() {
            const newApproach = {
                id: `temp_${nextTempId++}`,
                name: '新流派',
                color: '#2563eb',
                icon: 'fa-circle',
                enabled: true,
                sort_order: approaches.length + 1
            };
            approaches.push(newApproach);
            renderApproaches();
        }

        // 更新流派属性
        function updateApproach(index, field, value) {
            approaches[index][field] = value;
            if (field === 'icon' || field === 'color') {
                renderApproaches();
            }
        }

        // 删除流派
        function deleteApproach(index) {
            if (confirm(`确定要删除流派"${approaches[index].name}"吗？`)) {
                approaches.splice(index, 1);
                renderApproaches();
            }
        }

        // 保存所有流派配置
        async function saveAllApproaches() {
            // 验证ID唯一性
            const ids = approaches.map(a => a.id);
            const duplicates = ids.filter((id, index) => ids.indexOf(id) !== index);
            if (duplicates.length > 0) {
                showMessage('错误：存在重复的ID - ' + duplicates.join(', '), 'error');
                return;
            }

            // 验证必填字段
            for (const approach of approaches) {
                if (!approach.id || !approach.name) {
                    showMessage('错误：所有流派必须有ID和名称', 'error');
                    return;
                }
            }

            try {
                const response = await fetch('http://localhost:8003/api/approaches', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(approaches)
                });

                if (response.ok) {
                    showMessage('保存成功！', 'success');
                    await loadApproaches();
                } else {
                    const error = await response.text();
                    showMessage('保存失败：' + error, 'error');
                }
            } catch (error) {
                showMessage('无法连接到后端服务，请确保已启动配置服务器', 'error');
                console.error(error);
            }
        }

        // 显示消息
        function showMessage(message, type) {
            const messageEl = document.getElementById('statusMessage');
            messageEl.className = `mt-4 p-4 rounded-lg ${type === 'success' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`;
            messageEl.textContent = message;
            messageEl.classList.remove('hidden');

            if (type === 'success') {
                setTimeout(() => {
                    messageEl.classList.add('hidden');
                }, 3000);
            }
        }

        // 页面加载时加载配置
        window.onload = loadApproaches;
    </script>
</body>
</html>
