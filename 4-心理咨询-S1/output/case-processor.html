<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单案例处理 - 心理咨询案例管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <style>
        .step {
            transition: all 0.3s ease;
        }
        .step.active {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        .step.completed {
            border-color: #10b981;
            background-color: #f0fdf4;
        }
        .tag-item {
            display: inline-block;
            padding: 4px 12px;
            margin: 4px;
            background: #e0e7ff;
            border-radius: 16px;
            cursor: pointer;
        }
        .tag-item.selected {
            background: #4f46e5;
            color: white;
        }
        .upload-area {
            border: 2px dashed #cbd5e1;
            transition: all 0.3s;
        }
        .upload-area:hover {
            border-color: #3b82f6;
            background-color: #f8fafc;
        }
        .upload-area.dragover {
            border-color: #10b981;
            background-color: #f0fdf4;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- 标题栏 -->
        <div class="mb-8">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800">单案例处理</h1>
                    <p class="text-gray-600 mt-2">上传接访记录 → AI分析 → 核实信息 → 上传材料 → 保存案例</p>
                </div>
                <a href="index.html" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300">
                    <i class="fa fa-arrow-left mr-2"></i>返回主页
                </a>
            </div>
        </div>

        <!-- 步骤指示器 -->
        <div class="grid grid-cols-5 gap-4 mb-8">
            <div class="step active border-2 rounded-lg p-4 text-center" id="step1">
                <div class="text-2xl mb-2"><i class="fa fa-upload"></i></div>
                <div class="font-bold">上传Word</div>
            </div>
            <div class="step border-2 rounded-lg p-4 text-center" id="step2">
                <div class="text-2xl mb-2"><i class="fa fa-cog"></i></div>
                <div class="font-bold">AI分析</div>
            </div>
            <div class="step border-2 rounded-lg p-4 text-center" id="step3">
                <div class="text-2xl mb-2"><i class="fa fa-check"></i></div>
                <div class="font-bold">核实信息</div>
            </div>
            <div class="step border-2 rounded-lg p-4 text-center" id="step4">
                <div class="text-2xl mb-2"><i class="fa fa-file"></i></div>
                <div class="font-bold">上传材料</div>
            </div>
            <div class="step border-2 rounded-lg p-4 text-center" id="step5">
                <div class="text-2xl mb-2"><i class="fa fa-save"></i></div>
                <div class="font-bold">保存案例</div>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="bg-white rounded-lg shadow-lg p-8">

            <!-- 步骤1: 上传Word -->
            <div id="content-step1">
                <h2 class="text-2xl font-bold mb-4">上传接访记录</h2>
                <div class="upload-area rounded-lg p-12 text-center" id="wordUploadArea">
                    <i class="fa fa-cloud-upload text-6xl text-gray-400 mb-4"></i>
                    <p class="text-xl text-gray-600 mb-4">拖拽Word文档到此处，或点击选择文件</p>
                    <input type="file" id="wordFileInput" accept=".docx" class="hidden">
                    <button onclick="document.getElementById('wordFileInput').click()"
                            class="px-6 py-3 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
                        <i class="fa fa-folder-open mr-2"></i>选择文件
                    </button>
                </div>
                <div id="wordFileInfo" class="mt-4 hidden">
                    <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
                        <div class="flex items-center justify-between">
                            <div>
                                <i class="fa fa-file-word-o text-blue-600 text-2xl mr-3"></i>
                                <span id="wordFileName" class="font-bold"></span>
                                <span id="wordFileSize" class="text-gray-600 ml-2"></span>
                            </div>
                            <button onclick="startAnalysis()"
                                    class="px-6 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600">
                                <i class="fa fa-arrow-right mr-2"></i>开始分析
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 步骤2: AI分析中 -->
            <div id="content-step2" class="hidden">
                <h2 class="text-2xl font-bold mb-4">AI分析中...</h2>
                <div class="text-center py-12">
                    <i class="fa fa-spinner fa-spin text-6xl text-blue-500 mb-4"></i>
                    <p class="text-xl text-gray-600">正在分析接访记录，请稍候...</p>
                    <p class="text-gray-500 mt-2">AI正在提取标签、关键词、危机等级等信息</p>
                </div>
            </div>

            <!-- 步骤3: 核实信息 -->
            <div id="content-step3" class="hidden">
                <h2 class="text-2xl font-bold mb-6">核实案例信息</h2>

                <!-- 案例编号 -->
                <div class="mb-6 bg-gray-50 p-4 rounded-lg">
                    <label class="font-bold text-gray-700">案例编号：</label>
                    <span id="caseIdDisplay" class="text-xl text-blue-600 font-mono"></span>
                </div>

                <!-- 基本信息 -->
                <div class="mb-6">
                    <h3 class="font-bold text-lg mb-3">基本信息</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold mb-1">代号</label>
                            <input type="text" id="input_代号" class="w-full border rounded px-3 py-2">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1">性别</label>
                            <select id="input_性别" class="w-full border rounded px-3 py-2">
                                <option value="">未知</option>
                                <option value="男">男</option>
                                <option value="女">女</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1">年龄</label>
                            <input type="text" id="input_年龄" class="w-full border rounded px-3 py-2">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1">职业</label>
                            <input type="text" id="input_职业" class="w-full border rounded px-3 py-2">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1">婚姻状况</label>
                            <select id="input_婚姻状况" class="w-full border rounded px-3 py-2">
                                <option value="">未知</option>
                                <option value="未婚">未婚</option>
                                <option value="已婚">已婚</option>
                                <option value="离异">离异</option>
                                <option value="丧偶">丧偶</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 接访信息 -->
                <div class="mb-6">
                    <h3 class="font-bold text-lg mb-3">接访信息</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold mb-1">接访日期</label>
                            <input type="date" id="input_接访日期" class="w-full border rounded px-3 py-2">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1">接访次数</label>
                            <input type="text" id="input_接访次数" class="w-full border rounded px-3 py-2">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1">通话时长</label>
                            <input type="text" id="input_通话时长" placeholder="如: 45分钟" class="w-full border rounded px-3 py-2">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1">咨询渠道</label>
                            <select id="input_咨询渠道" class="w-full border rounded px-3 py-2">
                                <option value="">未知</option>
                                <option value="电话">电话</option>
                                <option value="视频">视频</option>
                                <option value="面对面">面对面</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 关系标签 -->
                <div class="mb-6">
                    <h3 class="font-bold text-lg mb-3">关系标签</h3>
                    <div id="relationTagsArea" class="border rounded p-4 min-h-[100px]"></div>
                </div>

                <!-- 精神症状标签 -->
                <div class="mb-6">
                    <h3 class="font-bold text-lg mb-3">精神症状标签</h3>
                    <div id="symptomTagsArea" class="border rounded p-4 min-h-[100px]"></div>
                </div>

                <!-- 危机等级 -->
                <div class="mb-6">
                    <h3 class="font-bold text-lg mb-3">危机等级</h3>
                    <select id="input_crisis_level" class="w-full border rounded px-3 py-2">
                        <option value="S">S - 自杀风险</option>
                        <option value="L">L - 生命危险</option>
                        <option value="M">M - 中度危机</option>
                        <option value="C" selected>C - 慢性困扰</option>
                        <option value="Z">Z - 正常范围</option>
                    </select>
                </div>

                <!-- 危机判据 -->
                <div class="mb-6">
                    <h3 class="font-bold text-lg mb-3">危机判据</h3>
                    <textarea id="input_crisis_evidence" rows="3" class="w-full border rounded px-3 py-2"></textarea>
                </div>

                <!-- 关键词 -->
                <div class="mb-6">
                    <h3 class="font-bold text-lg mb-3">关键词</h3>
                    <input type="text" id="input_keywords" placeholder="用逗号分隔" class="w-full border rounded px-3 py-2">
                </div>

                <!-- AI分析摘要 -->
                <div class="mb-6">
                    <h3 class="font-bold text-lg mb-3">AI分析摘要</h3>
                    <textarea id="input_summary" rows="4" class="w-full border rounded px-3 py-2"></textarea>
                </div>

                <div class="flex justify-end gap-4">
                    <button onclick="goToStep(1)" class="px-6 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300">
                        <i class="fa fa-arrow-left mr-2"></i>上一步
                    </button>
                    <button onclick="goToStep(4)" class="px-6 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
                        下一步<i class="fa fa-arrow-right ml-2"></i>
                    </button>
                </div>
            </div>

            <!-- 步骤4: 上传材料 -->
            <div id="content-step4" class="hidden">
                <h2 class="text-2xl font-bold mb-6">上传补充材料</h2>

                <!-- 录音文件 -->
                <div class="mb-6">
                    <h3 class="font-bold text-lg mb-3">录音文件</h3>
                    <div class="border rounded p-4">
                        <input type="file" id="audioFileInput" accept="audio/*" multiple class="mb-3">
                        <div id="audioFileList" class="space-y-2"></div>
                    </div>
                </div>

                <!-- 逐字稿 -->
                <div class="mb-6">
                    <h3 class="font-bold text-lg mb-3">逐字稿</h3>
                    <div class="border rounded p-4">
                        <button onclick="addTranscript()" class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600 mb-3">
                            <i class="fa fa-plus mr-2"></i>添加逐字稿
                        </button>
                        <div id="transcriptList" class="space-y-4"></div>
                    </div>
                </div>

                <!-- 督导资料 -->
                <div class="mb-6">
                    <h3 class="font-bold text-lg mb-3">督导资料</h3>
                    <div class="border rounded p-4">
                        <input type="file" id="supervisionFileInput" multiple class="mb-3">
                        <div id="supervisionFileList" class="space-y-2"></div>
                    </div>
                </div>

                <div class="flex justify-end gap-4">
                    <button onclick="goToStep(3)" class="px-6 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300">
                        <i class="fa fa-arrow-left mr-2"></i>上一步
                    </button>
                    <button onclick="goToStep(5)" class="px-6 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
                        下一步<i class="fa fa-arrow-right ml-2"></i>
                    </button>
                </div>
            </div>

            <!-- 步骤5: 保存确认 -->
            <div id="content-step5" class="hidden">
                <h2 class="text-2xl font-bold mb-6">保存案例</h2>
                <div class="bg-blue-50 border border-blue-200 rounded-lg p-6 mb-6">
                    <h3 class="font-bold text-lg mb-4">案例信息确认</h3>
                    <div id="finalSummary" class="space-y-2 text-gray-700"></div>
                </div>

                <div class="flex justify-end gap-4">
                    <button onclick="goToStep(4)" class="px-6 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300">
                        <i class="fa fa-arrow-left mr-2"></i>上一步
                    </button>
                    <button onclick="saveCase()" class="px-8 py-3 bg-green-500 text-white rounded-lg hover:bg-green-600 text-lg font-bold">
                        <i class="fa fa-save mr-2"></i>保存案例
                    </button>
                </div>
            </div>

            <!-- 保存成功 -->
            <div id="content-success" class="hidden text-center py-12">
                <i class="fa fa-check-circle text-6xl text-green-500 mb-4"></i>
                <h2 class="text-3xl font-bold text-gray-800 mb-4">案例保存成功！</h2>
                <p class="text-xl text-gray-600 mb-6">案例编号: <span id="successCaseId" class="font-mono font-bold"></span></p>
                <div class="flex justify-center gap-4">
                    <a href="index.html" class="px-6 py-3 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
                        返回主页
                    </a>
                    <button onclick="location.reload()" class="px-6 py-3 bg-green-500 text-white rounded-lg hover:bg-green-600">
                        处理新案例
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="case-processor.js"></script>
</body>
</html>
