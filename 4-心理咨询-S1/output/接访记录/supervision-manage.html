<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>督导资料管理 - 心理咨询案例系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <style>
        .upload-zone {
            border: 2px dashed #cbd5e0;
            transition: all 0.3s;
        }
        .upload-zone:hover {
            border-color: #f59e0b;
            background-color: #fffbeb;
        }
        .upload-zone.dragging {
            border-color: #d97706;
            background-color: #fef3c7;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="container mx-auto px-4 py-8 max-w-5xl">
        <!-- 标题栏 -->
        <div class="bg-white rounded-lg shadow-sm p-6 mb-6">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">
                        <i class="fa fa-briefcase text-amber-600"></i> 督导资料管理
                    </h1>
                    <p class="text-gray-500 mt-1">上传和管理督导笔记、文档等资料</p>
                </div>
                <a href="../index.html" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition">
                    <i class="fa fa-home"></i> 返回首页
                </a>
            </div>
        </div>

        <!-- 案例选择 -->
        <div class="bg-white rounded-lg shadow-sm p-6 mb-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">
                <i class="fa fa-folder-open text-amber-600"></i> 选择案例
            </h2>
            <div class="flex gap-4">
                <input
                    type="text"
                    id="caseIdInput"
                    placeholder="输入案例编号，例如: C20260616001"
                    class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500"
                >
                <button
                    onclick="loadCaseSupervision()"
                    class="px-6 py-2 bg-amber-600 text-white rounded-lg hover:bg-amber-700 transition">
                    <i class="fa fa-search"></i> 加载案例
                </button>
            </div>
            <div id="caseInfo" class="mt-4 hidden">
                <div class="bg-amber-50 border border-amber-200 rounded-lg p-4">
                    <p class="text-sm text-gray-700">
                        <strong>当前案例：</strong><span id="currentCaseId" class="text-amber-700 font-mono"></span>
                    </p>
                </div>
            </div>
        </div>

        <!-- 上传区域 -->
        <div id="uploadSection" class="hidden">
            <div class="bg-white rounded-lg shadow-sm p-6 mb-6">
                <h2 class="text-lg font-semibold text-gray-800 mb-4">
                    <i class="fa fa-upload text-amber-600"></i> 上传督导资料
                </h2>

                <!-- 资料信息 -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">资料标题</label>
                    <input
                        type="text"
                        id="supervisionTitle"
                        placeholder="例如：第一次督导笔记、案例讨论记录"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500"
                    >
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">备注说明（可选）</label>
                    <textarea
                        id="supervisionNote"
                        rows="2"
                        placeholder="关于这份资料的补充说明..."
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500"
                    ></textarea>
                </div>

                <!-- 拖拽上传区 -->
                <div id="dropZone" class="upload-zone rounded-lg p-8 text-center mb-4">
                    <i class="fa fa-cloud-upload text-5xl text-gray-400 mb-4"></i>
                    <p class="text-gray-600 mb-2">拖拽文件到此处，或点击选择文件</p>
                    <p class="text-sm text-gray-400">支持格式: TXT, MD, PDF, DOC, DOCX, JPG, PNG</p>
                    <input
                        type="file"
                        id="supervisionFileInput"
                        accept=".txt,.md,.pdf,.doc,.docx,.jpg,.jpeg,.png"
                        class="hidden"
                    >
                    <button
                        onclick="document.getElementById('supervisionFileInput').click()"
                        class="mt-4 px-6 py-2 bg-amber-600 text-white rounded-lg hover:bg-amber-700 transition">
                        <i class="fa fa-folder-open"></i> 选择文件
                    </button>
                </div>

                <!-- 上传进度 -->
                <div id="uploadProgress" class="hidden">
                    <div class="bg-amber-50 border border-amber-200 rounded-lg p-4">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-sm text-gray-700">
                                <i class="fa fa-spinner fa-spin"></i> 正在上传...
                            </span>
                            <span id="uploadStatus" class="text-sm text-amber-600"></span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2">
                            <div id="progressBar" class="bg-amber-600 h-2 rounded-full transition-all" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 督导资料列表 -->
            <div class="bg-white rounded-lg shadow-sm p-6">
                <h2 class="text-lg font-semibold text-gray-800 mb-4">
                    <i class="fa fa-list text-purple-600"></i> 已上传督导资料
                </h2>
                <div id="supervisionList" class="space-y-3">
                    <!-- 动态加载 -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8006';
        let currentCaseId = null;

        // 加载案例督导资料
        async function loadCaseSupervision() {
            const caseId = document.getElementById('caseIdInput').value.trim();
            if (!caseId) {
                alert('请输入案例编号');
                return;
            }

            currentCaseId = caseId;
            document.getElementById('currentCaseId').textContent = caseId;
            document.getElementById('caseInfo').classList.remove('hidden');
            document.getElementById('uploadSection').classList.remove('hidden');

            await refreshSupervisionList();
        }

        // 刷新督导资料列表
        async function refreshSupervisionList() {
            if (!currentCaseId) return;

            try {
                const response = await fetch(`${API_BASE}/api/supervision/list?case_id=${currentCaseId}`);
                const supervisionList = await response.json();

                const container = document.getElementById('supervisionList');

                if (supervisionList.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-8 text-gray-400">
                            <i class="fa fa-file-text-o text-4xl mb-3"></i>
                            <p>暂无督导资料</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = supervisionList.map(supervision => {
                    const fileIcon = getFileIcon(supervision.filename);
                    const note = supervision.note ? `<p class="text-xs text-gray-500 mt-1">${supervision.note}</p>` : '';

                    return `
                        <div class="border border-gray-200 rounded-lg p-4 hover:bg-gray-50 transition">
                            <div class="flex items-center justify-between">
                                <div class="flex-1">
                                    <div class="flex items-center gap-3 mb-2">
                                        <i class="fa ${fileIcon} text-amber-600 text-xl"></i>
                                        <div>
                                            <p class="font-medium text-gray-800">${supervision.title}</p>
                                            <p class="text-xs text-gray-500">${supervision.filename}</p>
                                            ${note}
                                        </div>
                                    </div>
                                    <div class="text-sm text-gray-500 ml-8">
                                        <span><i class="fa fa-calendar"></i> ${formatDateTime(supervision.uploaded_at)}</span>
                                        <span class="ml-4"><i class="fa fa-hdd-o"></i> ${formatFileSize(supervision.size)}</span>
                                    </div>
                                </div>
                                <div class="flex items-center gap-2">
                                    <a
                                        href="${API_BASE}${supervision.url}"
                                        target="_blank"
                                        class="px-3 py-2 bg-blue-100 text-blue-700 rounded hover:bg-blue-200 transition">
                                        <i class="fa fa-download"></i> 下载
                                    </a>
                                    <button
                                        onclick="deleteSupervision('${supervision.filename}')"
                                        class="px-3 py-2 bg-red-100 text-red-700 rounded hover:bg-red-200 transition">
                                        <i class="fa fa-trash"></i> 删除
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('加载督导资料列表失败:', error);
                alert('加载督导资料列表失败，请检查服务器是否启动');
            }
        }

        // 删除督导资料
        async function deleteSupervision(filename) {
            if (!confirm(`确定要删除督导资料 "${filename}" 吗？此操作不可恢复。`)) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/supervision/delete`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        case_id: currentCaseId,
                        filename: filename
                    })
                });

                const result = await response.json();
                if (result.success) {
                    alert('删除成功');
                    await refreshSupervisionList();
                } else {
                    alert('删除失败: ' + result.error);
                }
            } catch (error) {
                console.error('删除失败:', error);
                alert('删除失败，请检查服务器是否启动');
            }
        }

        // 文件上传处理
        document.getElementById('supervisionFileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                await uploadSupervision(file);
            }
        });

        // 拖拽上传
        const dropZone = document.getElementById('dropZone');

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragging');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragging');
        });

        dropZone.addEventListener('drop', async (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragging');

            const file = e.dataTransfer.files[0];
            if (file) {
                await uploadSupervision(file);
            }
        });

        // 上传督导资料
        async function uploadSupervision(file) {
            if (!currentCaseId) {
                alert('请先选择案例');
                return;
            }

            const title = document.getElementById('supervisionTitle').value.trim() || file.name;
            const note = document.getElementById('supervisionNote').value.trim();

            const formData = new FormData();
            formData.append('case_id', currentCaseId);
            formData.append('title', title);
            formData.append('note', note);
            formData.append('supervision_file', file);

            const progressDiv = document.getElementById('uploadProgress');
            const progressBar = document.getElementById('progressBar');
            const uploadStatus = document.getElementById('uploadStatus');

            progressDiv.classList.remove('hidden');
            progressBar.style.width = '0%';
            uploadStatus.textContent = '准备上传...';

            try {
                progressBar.style.width = '30%';
                uploadStatus.textContent = '上传中...';

                const response = await fetch(`${API_BASE}/api/supervision/upload`, {
                    method: 'POST',
                    body: formData
                });

                progressBar.style.width = '100%';
                uploadStatus.textContent = '上传完成';

                if (response.ok) {
                    setTimeout(() => {
                        progressDiv.classList.add('hidden');
                        alert('上传成功！');
                        clearSupervisionForm();
                        refreshSupervisionList();
                    }, 500);
                } else {
                    throw new Error('上传失败');
                }
            } catch (error) {
                console.error('上传失败:', error);
                progressDiv.classList.add('hidden');
                alert('上传失败，请检查服务器是否启动');
            }
        }

        // 清空表单
        function clearSupervisionForm() {
            document.getElementById('supervisionTitle').value = '';
            document.getElementById('supervisionNote').value = '';
            document.getElementById('supervisionFileInput').value = '';
        }

        // 获取文件图标
        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                'txt': 'fa-file-text-o',
                'md': 'fa-file-code-o',
                'pdf': 'fa-file-pdf-o',
                'doc': 'fa-file-word-o',
                'docx': 'fa-file-word-o',
                'jpg': 'fa-file-image-o',
                'jpeg': 'fa-file-image-o',
                'png': 'fa-file-image-o'
            };
            return icons[ext] || 'fa-file-o';
        }

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        // 格式化日期时间
        function formatDateTime(isoString) {
            const date = new Date(isoString);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
    </script>
</body>
</html>
