<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>案例列表 - 心理咨询案例管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .case-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .case-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-active {
            background: #dcfce7;
            color: #166534;
        }
        .status-closed {
            background: #e5e7eb;
            color: #374151;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto">
        <!-- 头部 -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800 mb-2">
                        <i class="fa fa-folder-open text-purple-600"></i> 案例管理
                    </h1>
                    <p class="text-gray-600">管理所有进行中和已结案的咨询案例</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="location.href='intake-record-new.html'"
                            class="px-6 py-3 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition">
                        <i class="fa fa-plus"></i> 新建案例
                    </button>
                    <button onclick="loadCases()"
                            class="px-6 py-3 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition">
                        <i class="fa fa-refresh"></i> 刷新
                    </button>
                </div>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-600 text-sm">进行中</p>
                        <p class="text-3xl font-bold text-green-600" id="activeCount">-</p>
                    </div>
                    <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                        <i class="fa fa-play text-green-600 text-xl"></i>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-600 text-sm">已结案</p>
                        <p class="text-3xl font-bold text-gray-600" id="closedCount">-</p>
                    </div>
                    <div class="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center">
                        <i class="fa fa-check text-gray-600 text-xl"></i>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-600 text-sm">总案例数</p>
                        <p class="text-3xl font-bold text-purple-600" id="totalCount">-</p>
                    </div>
                    <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center">
                        <i class="fa fa-folder text-purple-600 text-xl"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- 筛选器 -->
        <div class="bg-white rounded-lg shadow p-4 mb-6">
            <div class="flex items-center gap-4">
                <label class="text-gray-700 font-medium">筛选:</label>
                <select id="statusFilter" onchange="filterCases()"
                        class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500">
                    <option value="all">全部案例</option>
                    <option value="active">进行中</option>
                    <option value="closed">已结案</option>
                </select>

                <input type="text" id="searchInput" placeholder="搜索代号、主诉..."
                       oninput="filterCases()"
                       class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500">
            </div>
        </div>

        <!-- 案例列表 -->
        <div id="loadingContainer" class="text-center py-12 bg-white rounded-lg shadow">
            <div class="loading mx-auto mb-4"></div>
            <p class="text-gray-600">加载案例列表...</p>
        </div>

        <div id="caseListContainer" class="hidden">
            <div id="caseList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- 案例卡片将动态插入这里 -->
            </div>

            <div id="emptyState" class="hidden text-center py-12 bg-white rounded-lg shadow">
                <i class="fa fa-inbox text-gray-400 text-6xl mb-4"></i>
                <p class="text-gray-600 text-lg mb-2">暂无案例</p>
                <p class="text-gray-500 mb-6">点击"新建案例"开始创建第一个案例</p>
                <button onclick="location.href='intake-record-new.html'"
                        class="px-6 py-3 bg-purple-600 text-white rounded-lg hover:bg-purple-700">
                    <i class="fa fa-plus"></i> 新建案例
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5001/api';
        let allCases = [];

        // 页面加载时获取案例列表
        document.addEventListener('DOMContentLoaded', () => {
            loadCases();
        });

        // 加载案例列表
        async function loadCases() {
            try {
                const response = await fetch(`${API_BASE}/cases`);
                const result = await response.json();

                if (result.success) {
                    allCases = result.cases;
                    updateStats();
                    filterCases();

                    document.getElementById('loadingContainer').classList.add('hidden');
                    document.getElementById('caseListContainer').classList.remove('hidden');
                } else {
                    showError('加载失败: ' + result.error);
                }
            } catch (error) {
                showError('无法连接到服务器，请确保后端服务已启动');
                console.error(error);
            }
        }

        // 更新统计数据
        function updateStats() {
            const activeCount = allCases.filter(c => c.status === 'active').length;
            const closedCount = allCases.filter(c => c.status === 'closed').length;

            document.getElementById('activeCount').textContent = activeCount;
            document.getElementById('closedCount').textContent = closedCount;
            document.getElementById('totalCount').textContent = allCases.length;
        }

        // 筛选案例
        function filterCases() {
            const statusFilter = document.getElementById('statusFilter').value;
            const searchInput = document.getElementById('searchInput').value.toLowerCase();

            let filtered = allCases;

            // 状态筛选
            if (statusFilter !== 'all') {
                filtered = filtered.filter(c => c.status === statusFilter);
            }

            // 搜索筛选
            if (searchInput) {
                filtered = filtered.filter(c =>
                    c.代号.toLowerCase().includes(searchInput) ||
                    c.主诉简述.toLowerCase().includes(searchInput)
                );
            }

            renderCaseList(filtered);
        }

        // 渲染案例列表
        function renderCaseList(cases) {
            const container = document.getElementById('caseList');
            const emptyState = document.getElementById('emptyState');

            if (cases.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');

            container.innerHTML = cases.map(c => `
                <div class="case-card bg-white rounded-lg shadow p-6" onclick="openCase('${c.case_id}')">
                    <div class="flex items-start justify-between mb-4">
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <h3 class="text-xl font-bold text-gray-800">${c.代号}</h3>
                                <span class="status-badge status-${c.status}">
                                    ${c.status === 'active' ? '进行中' : '已结案'}
                                </span>
                            </div>
                            <p class="text-gray-600 text-sm">${c.性别} · ${c.年龄}岁</p>
                        </div>
                        <div class="text-right">
                            <div class="text-2xl font-bold text-purple-600">${c.total_sessions}</div>
                            <div class="text-xs text-gray-500">次会谈</div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <p class="text-gray-700 text-sm line-clamp-2">${c.主诉简述}</p>
                    </div>

                    <div class="flex items-center justify-between text-sm text-gray-500">
                        <div>
                            <i class="fa fa-clock-o"></i>
                            最后更新: ${formatDate(c.last_session_date || c.created_at)}
                        </div>
                        <div>
                            <i class="fa fa-arrow-right"></i>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 打开案例
        function openCase(caseId) {
            location.href = `intake-record-new.html?case_id=${caseId}`;
        }

        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return `${date.getMonth() + 1}/${date.getDate()}`;
        }

        // 显示错误
        function showError(message) {
            document.getElementById('loadingContainer').innerHTML = `
                <div class="text-center py-12 bg-white rounded-lg shadow">
                    <i class="fa fa-exclamation-triangle text-red-500 text-6xl mb-4"></i>
                    <p class="text-gray-800 text-lg mb-2">加载失败</p>
                    <p class="text-gray-600 mb-6">${message}</p>
                    <button onclick="loadCases()" class="px-6 py-3 bg-purple-600 text-white rounded-lg hover:bg-purple-700">
                        <i class="fa fa-refresh"></i> 重试
                    </button>
                </div>
            `;
        }
    </script>
</body>
</html>
