<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>语音输入助手 - Voice Input</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
<style>
  @keyframes pulse-recording {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.05); }
  }
  .recording-pulse {
    animation: pulse-recording 1.5s ease-in-out infinite;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in {
    animation: fadeIn 0.3s ease-out;
  }
  .interim-text {
    color: #9ca3af;
    font-style: italic;
  }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<div class="max-w-3xl mx-auto px-4 py-8">
  <!-- Header -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl mb-4 shadow-lg">
      <i class="fa fa-microphone text-white text-2xl"></i>
    </div>
    <h1 class="text-2xl font-bold text-gray-800">语音输入助手</h1>
    <p class="text-gray-500 mt-1 text-sm">实时语音转文字 · 自动过滤感叹词 · 一键复制</p>
  </div>

  <!-- Status Bar -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-4">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div id="statusIndicator" class="w-3 h-3 rounded-full bg-gray-300"></div>
        <span id="statusText" class="text-sm text-gray-600">就绪，点击下方按钮开始录音</span>
      </div>
      <div class="flex items-center gap-3 text-xs text-gray-400">
        <span id="durationDisplay">00:00</span>
        <span class="hidden" id="wordCount">0 字</span>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-4">
    <div class="flex flex-wrap items-center gap-3">
      <!-- Main Record Button -->
      <button id="recordBtn" onclick="toggleRecording()"
              class="flex-1 min-w-[200px] py-4 px-6 rounded-xl font-bold text-lg transition-all duration-300 flex items-center justify-center gap-3
                     bg-gradient-to-r from-blue-500 to-blue-600 text-white hover:from-blue-600 hover:to-blue-700 shadow-md hover:shadow-lg">
        <i id="recordBtnIcon" class="fa fa-microphone text-xl"></i>
        <span id="recordBtnText">开始录音</span>
      </button>

      <!-- Clear Button -->
      <button onclick="clearAll()"
              class="py-4 px-5 rounded-xl font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 transition-all duration-200 flex items-center gap-2">
        <i class="fa fa-trash-o"></i>
        <span class="hidden sm:inline">清空</span>
      </button>

      <!-- Copy Button -->
      <button id="copyBtn" onclick="copyText()" disabled
              class="py-4 px-5 rounded-xl font-medium transition-all duration-200 flex items-center gap-2
                     bg-gray-100 text-gray-400 hover:bg-gray-200 disabled:cursor-not-allowed">
        <i class="fa fa-copy"></i>
        <span class="hidden sm:inline" id="copyBtnText">复制</span>
      </button>
    </div>

    <!-- Settings Row -->
    <div class="mt-4 pt-4 border-t border-gray-100 flex flex-wrap items-center gap-4">
      <!-- Language -->
      <div class="flex items-center gap-2">
        <label class="text-xs text-gray-500 font-medium">语言</label>
        <select id="langSelect" onchange="updateLanguage()"
                class="text-sm border border-gray-200 rounded-lg px-3 py-2 bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
          <option value="zh-CN" selected>中文（普通话）</option>
          <option value="zh-TW">中文（粤语/台湾）</option>
          <option value="en-US">English (US)</option>
          <option value="ja-JP">日本語</option>
          <option value="ko-KR">한국어</option>
        </select>
      </div>

      <!-- Filter Toggle -->
      <div class="flex items-center gap-2">
        <label class="text-xs text-gray-500 font-medium">过滤赘语</label>
        <button id="filterToggle" onclick="toggleFilter()"
                class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors duration-200 bg-blue-500 focus:outline-none">
          <span class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform duration-200 translate-x-6"></span>
        </button>
      </div>

      <!-- Continuous Mode -->
      <div class="flex items-center gap-2">
        <label class="text-xs text-gray-500 font-medium">连续模式</label>
        <button id="continuousToggle" onclick="toggleContinuous()"
                class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors duration-200 bg-gray-300 focus:outline-none">
          <span class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform duration-200 translate-x-1"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- Transcript Display -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-4 min-h-[300px]">
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide">转录结果</h2>
      <span class="text-xs text-gray-400" id="finalCount">0 段</span>
    </div>

    <!-- Interim Result (实时预览) -->
    <div id="interimDisplay" class="hidden mb-3 p-3 bg-blue-50 border border-blue-200 rounded-lg">
      <span class="text-xs text-blue-500 font-medium mr-2">实时识别中…</span>
      <span id="interimText" class="interim-text text-gray-600"></span>
    </div>

    <!-- Final Results -->
    <div id="transcriptDisplay" class="space-y-2">
      <div class="text-gray-300 text-center py-12" id="emptyState">
        <i class="fa fa-microphone text-5xl mb-3 block"></i>
        <p class="text-sm">点击「开始录音」按钮开始语音输入</p>
        <p class="text-xs mt-1 text-gray-300">支持中文、英文、日语、韩语</p>
      </div>
    </div>

    <!-- Cleaned Text (过滤后) -->
    <div id="cleanedSection" class="hidden mt-6 pt-4 border-t-2 border-green-100">
      <div class="flex items-center gap-2 mb-2">
        <i class="fa fa-magic text-green-500 text-sm"></i>
        <span class="text-sm font-semibold text-green-600">智能清洗后（去除赘语）</span>
      </div>
      <div id="cleanedDisplay" class="text-gray-800 leading-relaxed whitespace-pre-wrap"></div>
    </div>
  </div>

  <!-- Filler Words Stats -->
  <div id="statsSection" class="hidden bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-4">
    <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">过滤统计</h3>
    <div class="flex flex-wrap gap-2" id="filteredWordsList"></div>
  </div>

  <!-- Export Section -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4">
    <details class="group">
      <summary class="cursor-pointer text-sm font-semibold text-gray-500 uppercase tracking-wide select-none">导出选项</summary>
      <div class="mt-3 pt-3 border-t border-gray-100 flex flex-wrap gap-2">
        <button onclick="exportAsText()" class="py-2 px-4 rounded-lg text-sm font-medium bg-gray-100 hover:bg-gray-200 text-gray-700 transition-all">
          <i class="fa fa-file-text-o mr-1"></i> 导出 TXT
        </button>
        <button onclick="exportAsMarkdown()" class="py-2 px-4 rounded-lg text-sm font-medium bg-gray-100 hover:bg-gray-200 text-gray-700 transition-all">
          <i class="fa fa-file-code-o mr-1"></i> 导出 Markdown
        </button>
        <button onclick="sendToClaude()" class="py-2 px-4 rounded-lg text-sm font-medium bg-purple-100 hover:bg-purple-200 text-purple-700 transition-all">
          <i class="fa fa-paper-plane-o mr-1"></i> 发送到 Claude
        </button>
      </div>
    </details>
  </div>
</div>

<script>
// ==================== State ====================
let recognition = null;
let isRecording = false;
let isContinuous = false;
let filterEnabled = true;
let segments = [];          // [{raw: string, cleaned: string, timestamp: Date}]
let currentInterim = '';
let recordingStartTime = null;
let durationInterval = null;

// Filler words dictionary (Chinese + English)
const FILLER_WORDS = {
  'zh-CN': [
    '嗯', '啊', '呃', '哦', '唔', '额', '诶',
    '这个', '那个', '就是说', '然后', '就是', '那个什么',
    '怎么说呢', '那个啥', '这样子', '反正', '基本上',
    '一般来说', '可以说', '实际上', '说白了',
    '对吧', '对不对', '你知道吗', '你懂吗', '明白吗',
    '所以呢', '那么', '总而言之', '总的来说',
  ],
  'en-US': [
    'um', 'uh', 'er', 'ah', 'hmm', 'mmm',
    'like', 'you know', 'i mean', 'sort of', 'kind of',
    'basically', 'actually', 'literally', 'honestly',
    'right', 'okay', 'so', 'well', 'anyway',
    'i guess', 'you see', 'if you will',
  ],
  'ja-JP': [
    'あの', 'ええと', 'えー', 'まあ', 'その',
    'なんか', 'ていうか', 'そうですね', 'ですね',
  ],
  'ko-KR': [
    '음', '어', '그', '아', '저기', '그러니까',
    '뭐랄까', '그냥', '왜냐하면',
  ],
};

// ==================== Speech Recognition Setup ====================
function getRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    alert('您的浏览器不支持语音识别。请使用 Chrome 或 Edge 浏览器。');
    return null;
  }
  const rec = new SpeechRecognition();
  rec.lang = document.getElementById('langSelect').value;
  rec.interimResults = true;
  rec.maxAlternatives = 1;
  return rec;
}

function setupRecognition() {
  if (recognition) {
    recognition.onresult = null;
    recognition.onend = null;
    recognition.onerror = null;
  }
  recognition = getRecognition();
  if (!recognition) return;

  recognition.onresult = (event) => {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const result = event.results[i];
      if (result.isFinal) {
        const rawText = result[0].transcript.trim();
        if (rawText) {
          const cleanedText = filterEnabled ? removeFillerWords(rawText) : rawText;
          segments.push({
            raw: rawText,
            cleaned: cleanedText,
            timestamp: new Date(),
          });
          updateDisplay();
          updateStats();
        }
      } else {
        interim += result[0].transcript;
      }
    }
    currentInterim = interim;
    updateInterim(interim);
  };

  recognition.onend = () => {
    if (isRecording) {
      // If continuous mode, restart immediately
      if (isContinuous) {
        try { recognition.start(); } catch(e) { /* ignore */ }
      } else {
        stopRecording();
      }
    }
  };

  recognition.onerror = (event) => {
    console.error('Speech recognition error:', event.error);
    if (event.error === 'no-speech') {
      // Silent timeout — restart if in continuous mode
      if (isContinuous && isRecording) {
        try { recognition.start(); } catch(e) { /* ignore */ }
      }
    } else if (event.error === 'not-allowed') {
      alert('请允许麦克风访问权限后重试。');
      stopRecording();
    } else if (event.error === 'aborted') {
      // Expected when stopping
    } else {
      stopRecording();
    }
  };
}

// ==================== Recording Controls ====================
function toggleRecording() {
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
}

function startRecording() {
  setupRecognition();
  if (!recognition) return;

  try {
    recognition.start();
    isRecording = true;
    recordingStartTime = Date.now();
    updateRecordingUI();
    startDurationTimer();
  } catch(e) {
    console.error('Failed to start:', e);
    alert('启动语音识别失败，请刷新页面后重试。');
  }
}

function stopRecording() {
  isRecording = false;
  if (recognition) {
    try { recognition.stop(); } catch(e) { /* ignore */ }
  }
  updateRecordingUI();
  stopDurationTimer();
  updateInterim('');
}

function updateRecordingUI() {
  const btn = document.getElementById('recordBtn');
  const icon = document.getElementById('recordBtnIcon');
  const text = document.getElementById('recordBtnText');
  const indicator = document.getElementById('statusIndicator');
  const statusText = document.getElementById('statusText');

  if (isRecording) {
    btn.className = btn.className.replace(/from-blue-500 to-blue-600/g, 'from-red-500 to-red-600')
                                 .replace(/hover:from-blue-600 hover:to-blue-700/g, 'hover:from-red-600 hover:to-red-700');
    icon.className = 'fa fa-microphone text-xl recording-pulse';
    text.textContent = '停止录音';
    indicator.className = 'w-3 h-3 rounded-full bg-red-500 recording-pulse';
    statusText.textContent = isContinuous ? '连续录音中…' : '正在录音中…';
  } else {
    btn.className = btn.className.replace(/from-red-500 to-red-600/g, 'from-blue-500 to-blue-600')
                                 .replace(/hover:from-red-600 hover:to-red-700/g, 'hover:from-blue-600 hover:to-blue-700');
    icon.className = 'fa fa-microphone text-xl';
    text.textContent = '开始录音';
    indicator.className = 'w-3 h-3 rounded-full bg-gray-300';
    statusText.textContent = '就绪，点击下方按钮开始录音';
  }
}

// ==================== Duration Timer ====================
function startDurationTimer() {
  durationInterval = setInterval(() => {
    if (!recordingStartTime) return;
    const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
    const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const secs = String(elapsed % 60).padStart(2, '0');
    document.getElementById('durationDisplay').textContent = `${mins}:${secs}`;
  }, 200);
}

function stopDurationTimer() {
  if (durationInterval) { clearInterval(durationInterval); durationInterval = null; }
}

// ==================== Display Updates ====================
function updateInterim(text) {
  const display = document.getElementById('interimDisplay');
  const textEl = document.getElementById('interimText');
  if (text && isRecording) {
    display.classList.remove('hidden');
    textEl.textContent = text;
  } else {
    display.classList.add('hidden');
    textEl.textContent = '';
  }
}

function updateDisplay() {
  const display = document.getElementById('transcriptDisplay');
  const emptyState = document.getElementById('emptyState');
  const finalCount = document.getElementById('finalCount');
  const wordCount = document.getElementById('wordCount');
  const copyBtn = document.getElementById('copyBtn');
  const cleanedSection = document.getElementById('cleanedSection');
  const cleanedDisplay = document.getElementById('cleanedDisplay');

  if (segments.length === 0) {
    emptyState.classList.remove('hidden');
    display.innerHTML = '';
    display.appendChild(emptyState);
    finalCount.textContent = '0 段';
    wordCount.classList.add('hidden');
    copyBtn.disabled = true;
    copyBtn.className = copyBtn.className.replace(/bg-blue-500 text-white hover:bg-blue-600/, 'bg-gray-100 text-gray-400 hover:bg-gray-200');
    document.getElementById('copyBtnText').textContent = '复制';
    document.getElementById('statsSection').classList.add('hidden');
    cleanedSection.classList.add('hidden');
    return;
  }

  emptyState.classList.add('hidden');
  display.innerHTML = segments.map((seg, i) =>
    `<div class="fade-in p-3 bg-gray-50 rounded-lg">
      <div class="flex items-start gap-2">
        <span class="text-xs text-gray-400 font-mono mt-0.5">#${i + 1}</span>
        <div class="flex-1">
          <p class="text-gray-800">${escapeHtml(seg.cleaned)}</p>
          ${seg.raw !== seg.cleaned ? `<p class="text-xs text-gray-400 line-through mt-1">原文: ${escapeHtml(seg.raw)}</p>` : ''}
        </div>
        <span class="text-xs text-gray-300 whitespace-nowrap">${formatTime(seg.timestamp)}</span>
      </div>
    </div>`
  ).join('');

  finalCount.textContent = `${segments.length} 段`;
  const totalChars = segments.reduce((sum, s) => sum + s.cleaned.length, 0);
  wordCount.classList.remove('hidden');
  wordCount.textContent = `${totalChars} 字`;

  // Copy button
  copyBtn.disabled = false;
  copyBtn.className = copyBtn.className.replace(/bg-gray-100 text-gray-400 hover:bg-gray-200/, 'bg-blue-500 text-white hover:bg-blue-600 shadow-md');
  document.getElementById('copyBtnText').textContent = '复制';

  // Cleaned section (if any filtering happened)
  const hasFiltered = segments.some(s => s.raw !== s.cleaned);
  if (hasFiltered && filterEnabled) {
    cleanedSection.classList.remove('hidden');
    const fullCleaned = segments.map(s => s.cleaned).join('\n');
    cleanedDisplay.textContent = fullCleaned;
  } else if (!filterEnabled) {
    cleanedSection.classList.add('hidden');
  }
}

function updateStats() {
  const statsSection = document.getElementById('statsSection');
  const filteredList = document.getElementById('filteredWordsList');

  if (!filterEnabled) {
    statsSection.classList.add('hidden');
    return;
  }

  // Count removed filler words
  const removedCounts = {};
  segments.forEach(seg => {
    if (seg.raw !== seg.cleaned) {
      const rawWords = seg.raw.split(/\s+/);
      const cleanedWords = new Set(seg.cleaned.split(/\s+/));
      rawWords.forEach(w => {
        const clean = w.replace(/[，。！？、,\.!\?]/g, '');
        if (!cleanedWords.has(clean) && clean.length > 0 && clean.length < 10) {
          removedCounts[clean] = (removedCounts[clean] || 0) + 1;
        }
      });
    }
  });

  const entries = Object.entries(removedCounts).sort((a, b) => b[1] - a[1]).slice(0, 15);
  if (entries.length === 0) {
    statsSection.classList.add('hidden');
    return;
  }

  statsSection.classList.remove('hidden');
  filteredList.innerHTML = entries.map(([word, count]) =>
    `<span class="inline-flex items-center gap-1 px-3 py-1.5 bg-red-50 text-red-600 rounded-full text-xs font-medium">
      <span class="line-through opacity-60">${escapeHtml(word)}</span>
      <span class="bg-red-100 text-red-500 rounded-full w-5 h-5 inline-flex items-center justify-center text-xs font-bold">${count}</span>
    </span>`
  ).join('');
}

// ==================== Filler Word Removal ====================
function removeFillerWords(text) {
  let cleaned = text;
  const lang = document.getElementById('langSelect').value;
  const fillers = FILLER_WORDS[lang] || FILLER_WORDS['zh-CN'];

  // Sort by length descending to match longer phrases first
  const sortedFillers = [...fillers].sort((a, b) => b.length - a.length);

  sortedFillers.forEach(filler => {
    // Match filler as whole word/phrase, with optional surrounding punctuation
    const escaped = filler.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp(`\\s*${escaped}\\s*`, 'gi');
    cleaned = cleaned.replace(regex, '');
  });

  // Clean up multiple spaces
  cleaned = cleaned.replace(/\s{2,}/g, ' ').trim();

  // Clean up orphaned punctuation
  cleaned = cleaned.replace(/[,，。！？、\s]+$/g, '').replace(/^[,，。！？、\s]+/g, '');
  cleaned = cleaned.replace(/[,，]{2,}/g, '，');
  cleaned = cleaned.replace(/[。]{2,}/g, '。');

  // If cleaning removed everything, return original
  if (!cleaned.trim()) return text;

  return cleaned;
}

// ==================== Toggle Controls ====================
function toggleFilter() {
  filterEnabled = !filterEnabled;
  const toggle = document.getElementById('filterToggle');
  if (filterEnabled) {
    toggle.className = toggle.className.replace(/bg-gray-300/g, 'bg-blue-500');
    toggle.querySelector('span').className = toggle.querySelector('span').className.replace(/translate-x-1/g, 'translate-x-6');
  } else {
    toggle.className = toggle.className.replace(/bg-blue-500/g, 'bg-gray-300');
    toggle.querySelector('span').className = toggle.querySelector('span').className.replace(/translate-x-6/g, 'translate-x-1');
  }
  // Re-process all segments
  segments = segments.map(s => ({
    ...s,
    cleaned: filterEnabled ? removeFillerWords(s.raw) : s.raw,
  }));
  updateDisplay();
  updateStats();
}

function toggleContinuous() {
  isContinuous = !isContinuous;
  const toggle = document.getElementById('continuousToggle');
  if (isContinuous) {
    toggle.className = toggle.className.replace(/bg-gray-300/g, 'bg-blue-500');
    toggle.querySelector('span').className = toggle.querySelector('span').className.replace(/translate-x-1/g, 'translate-x-6');
  } else {
    toggle.className = toggle.className.replace(/bg-blue-500/g, 'bg-gray-300');
    toggle.querySelector('span').className = toggle.querySelector('span').className.replace(/translate-x-6/g, 'translate-x-1');
  }
}

function updateLanguage() {
  if (isRecording) stopRecording();
  setupRecognition();
}

// ==================== Actions ====================
function clearAll() {
  if (isRecording) stopRecording();
  segments = [];
  currentInterim = '';
  updateDisplay();
  updateInterim('');
  updateStats();
  document.getElementById('durationDisplay').textContent = '00:00';
}

function copyText() {
  const text = segments.map(s => s.cleaned).join('\n');
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtnText');
    const original = btn.textContent;
    btn.textContent = '已复制 ✓';
    setTimeout(() => { btn.textContent = original; }, 2000);
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const btn = document.getElementById('copyBtnText');
    btn.textContent = '已复制 ✓';
    setTimeout(() => { btn.textContent = '复制'; }, 2000);
  });
}

function exportAsText() {
  const text = segments.map(s => s.cleaned).join('\n\n');
  const blob = new Blob([text], {type: 'text/plain;charset=UTF-8'});
  downloadBlob(blob, `voice-input-${new Date().toISOString().slice(0,10)}.txt`);
}

function exportAsMarkdown() {
  const lines = ['# 语音转录记录', '', `> 生成时间: ${new Date().toLocaleString()}`, `> 总计: ${segments.length} 段`, ''];
  segments.forEach((seg, i) => {
    lines.push(`### 段落 ${i + 1}`);
    lines.push('');
    lines.push(seg.cleaned);
    lines.push('');
    if (seg.raw !== seg.cleaned) {
      lines.push(`<details><summary>原始文本</summary>`);
      lines.push('');
      lines.push(`> ${seg.raw}`);
      lines.push('');
      lines.push(`</details>`);
      lines.push('');
    }
  });
  const blob = new Blob([lines.join('\n')], {type: 'text/markdown;charset=UTF-8'});
  downloadBlob(blob, `voice-input-${new Date().toISOString().slice(0,10)}.md`);
}

function sendToClaude() {
  const text = segments.map(s => s.cleaned).join('\n\n');
  if (!text) return;
  // Format as a prompt for Claude
  const prompt = `以下是通过语音输入转录并清洗后的文本：\n\n---\n${text}\n---\n\n请根据以上内容进行处理。`;
  navigator.clipboard.writeText(prompt).then(() => {
    alert('已复制到剪贴板！请粘贴到 Claude 对话框中。');
  }).catch(() => {
    alert('复制失败，请手动复制。\n\n' + prompt);
  });
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ==================== Utilities ====================
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function formatTime(date) {
  return date.toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit', second: '2-digit'});
}

// ==================== Keyboard Shortcuts ====================
document.addEventListener('keydown', (e) => {
  // Ctrl+Shift+M to toggle recording
  if (e.ctrlKey && e.shiftKey && e.key === 'M') {
    e.preventDefault();
    toggleRecording();
  }
  // Ctrl+Shift+X to clear
  if (e.ctrlKey && e.shiftKey && e.key === 'X') {
    e.preventDefault();
    clearAll();
  }
});

// ==================== Init ====================
setupRecognition();
