<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceType</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Microsoft YaHei", sans-serif;
    background: #1a1a2e; color: #c8d6e5;
    width: 340px; min-height: 120px; user-select: none;
  }
  .container { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .status-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot.green { background: #4ade80; }
  .dot.red { background: #ef4444; }
  .dot.yellow { background: #f59e0b; animation: pulse 1s infinite; }
  .dot.blue { background: #60a5fa; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  .text-box {
    background: #16213e; border: 1px solid #2a2a4a; border-radius: 8px;
    padding: 10px; min-height: 40px; max-height: 120px; overflow-y: auto;
    font-size: 13px; line-height: 1.5;
  }
  .text-box .dim { color: #4a5568; }

  .btn {
    width: 100%; padding: 10px; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .btn-enable { background: #2563eb; color: #fff; }
  .btn-enable:hover { background: #1d4ed8; }
  .btn-enabled { background: #1e293b; color: #64748b; cursor: default; }

  .hint { font-size: 10px; color: #475569; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <!-- Status -->
  <div class="status-row">
    <span id="dot" class="dot red"></span>
    <span id="statusText">等待授权…</span>
    <span style="flex:1"></span>
    <span id="segCount" style="font-size:10px;color:#64748b;display:none"></span>
  </div>

  <!-- Text -->
  <div class="text-box" id="textBox">
    <span class="dim" id="placeholder">点击下方按钮授权麦克风（仅一次）</span>
  </div>

  <!-- Enable Button (shown only first time) -->
  <button class="btn btn-enable" id="enableBtn" onclick="enableMic()">
    🎤 点击授权麦克风
  </button>

  <!-- Status (shown after enable) -->
  <div id="enabledStatus" style="display:none;text-align:center;padding:8px;background:#1e293b;border-radius:8px;font-size:13px;">
    <span id="modeText">🟢 就绪 - 按 Ctrl+Shift+M 开始录音</span>
  </div>

  <div class="hint" id="hintLine">Ctrl+Shift+M 开始/停止 · 说完停顿 2s 自动粘贴</div>
</div>

<script>
// ====== Config ======
const SERVER = 'http://127.0.0.1:19876';
const SILENCE_SEC = 1.8;
const POLL_MS = 400;

// ====== State ======
let recognition = null;
let micEnabled = false;
let isListening = false;      // Web Speech API is running
let isCapturing = false;      // Server says we should keep text
let keptSegments = [];
let currentInterim = '';
let silenceTimer = null;
let serverOk = false;

// ====== Server Polling ======
async function pollServer() {
  try {
    const r = await fetch(SERVER + '/health');
    const data = await r.json();
    serverOk = true;

    if (!micEnabled) { updateUI(); return; }

    // Server requests start?
    if (data.recording && !isCapturing) {
      startCapturing();
    }

    // Server requests stop?
    if (data.requestStop && isCapturing) {
      stopCapturing();
    }

    updateUI(data);
  } catch(e) { serverOk = false; updateUI(); }
}

setInterval(pollServer, POLL_MS);

// ====== Mic Enable (one-time user gesture) ======
function enableMic() {
  if (micEnabled) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('请用 Chrome 浏览器打开'); return; }

  recognition = new SR();
  recognition.lang = 'zh-CN';
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;
  recognition.continuous = true;

  recognition.onresult = (e) => {
    if (!isCapturing && !isListening) return; // ignore when not recording
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const r = e.results[i];
      if (r.isFinal) {
        const raw = r[0].transcript.trim();
        if (raw && isCapturing) {
          keptSegments.push(raw);
          resetSilenceTimer();
        }
        updateDisplay();
      } else { interim += r[0].transcript; }
    }
    currentInterim = interim;
    updateDisplay();
  };

  recognition.onend = () => {
    if (isListening) {
      try { recognition.start(); } catch(_) { isListening = false; }
    }
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech' && isListening) {
      try { recognition.start(); } catch(_) {}
    } else if (e.error !== 'aborted') {
      isListening = false;
    }
  };

  // Start continuous listening
  try {
    recognition.start();
    isListening = true;
    micEnabled = true;
    document.getElementById('enableBtn').style.display = 'none';
    document.getElementById('enabledStatus').style.display = 'block';
    updateUI();
  } catch(e) {
    alert('启动失败: ' + e.message);
  }
}

// ====== Capture Control ======
function startCapturing() {
  if (!micEnabled) return;
  isCapturing = true;
  keptSegments = [];
  currentInterim = '';
  updateDisplay();
  resetSilenceTimer();
  updateUI();
}

function stopCapturing() {
  isCapturing = false;
  if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
  // Send kept text to server for paste
  if (keptSegments.length > 0) {
    const text = keptSegments.join('\n');
    sendToServer(text);
  }
  keptSegments = [];
  updateDisplay();
  updateUI();
}

function resetSilenceTimer() {
  if (silenceTimer) clearTimeout(silenceTimer);
  if (!isCapturing) return;
  silenceTimer = setTimeout(() => {
    // Silence timeout - stop and paste
    stopCapturing();
    // Also tell server we're done
    fetch(SERVER + '/stop', { method: 'POST' }).catch(()=>{});
  }, SILENCE_SEC * 1000);
}

// ====== Send to server ======
async function sendToServer(text) {
  try {
    await fetch(SERVER + '/report', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
  } catch(e) { console.error('Send error:', e); }
}

// ====== UI ======
function updateDisplay() {
  const box = document.getElementById('textBox');
  const ph = document.getElementById('placeholder');
  const count = document.getElementById('segCount');

  if (keptSegments.length > 0) {
    ph.style.display = 'none';
    count.style.display = 'inline';
    count.textContent = keptSegments.length + ' 句';
    box.innerHTML = keptSegments.map((s, i) =>
      `<div style="animation:fadeIn 0.3s ease">${esc(s)}</div>`
    ).join('') + (currentInterim && isCapturing ? `<span style="color:#636e72;font-style:italic">${esc(currentInterim)}</span>` : '');
  } else {
    ph.style.display = 'inline';
    count.style.display = 'none';
    box.innerHTML = '<span class="dim">' + ph.textContent + '</span>';
  }
}

function updateUI(data) {
  const dot = document.getElementById('dot');
  const status = document.getElementById('statusText');
  const mode = document.getElementById('modeText');

  if (!micEnabled) {
    dot.className = 'dot red'; status.textContent = '未授权';
  } else if (!serverOk) {
    dot.className = 'dot red'; status.textContent = '服务断开';
  } else if (isCapturing) {
    dot.className = 'dot yellow'; status.textContent = '录音中…';
    if (mode) mode.textContent = '🔴 录音中… 说完停顿 ' + SILENCE_SEC + 's 自动粘贴';
  } else {
    dot.className = 'dot green'; status.textContent = '就绪';
    if (mode) mode.textContent = '🟢 就绪 - 按 Ctrl+Shift+M 开始录音';
  }
}

// ====== Init ======
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
pollServer();
</script>
</body>
</html>
